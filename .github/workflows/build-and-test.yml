# ==============================================================================
# CI: Build & Test
# ==============================================================================
# 职责：
#   1. 构建验证 — 在多平台 / 多编译器 / 多 C 标准组合下确保编译通过
#   2. 行为验证 — 运行 CTest 单元测试，确保程序行为正确
# ==============================================================================
name: "CI: Build & Test"

on:
  push:
    branches: [ "main" ]
    paths: &build-paths
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/build-and-test.yml'
  pull_request:
    branches: [ "main" ]
    paths: *build-paths
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      # 禁用 fail-fast，使所有矩阵组合独立执行，一次性拿到全部构建结果。
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
        c_compiler: [gcc, clang, cl]
        c_standard: [99, 17, 23]

        exclude:
          - os: ubuntu-latest
            c_compiler: cl
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: windows-latest
            c_standard: 23

    steps:
      - uses: actions/checkout@v7

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_STANDARD=${{ matrix.c_standard }}
          -DCMAKE_C_STANDARD_REQUIRED=ON
          -DCMAKE_C_EXTENSIONS=OFF
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
